<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gate Control System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #0f172a; color: white; padding: 20px; }
        .card { max-width: 400px; margin: 20px auto; background: #1e293b; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; }
        
        .status-box { 
            font-size: 20px; font-weight: bold; padding: 20px; margin: 20px 0;
            border-radius: 15px; background: #334155; transition: 0.4s;
            border: 2px solid #475569;
        }
        .status-open { background: #10b981 !important; border-color: #059669; box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }
        .status-closed { background: #ef4444 !important; border-color: #dc2626; }
        .status-moving { background: #f59e0b !important; border-color: #d97706; animation: pulse 1s infinite; }

        @keyframes pulse { 50% { opacity: 0.7; } }

        button { width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        button:active { transform: scale(0.96); }
        
        .btn-connect { background: #3b82f6; color: white; }
        .btn-open { background: #10b981; color: white; }
        .btn-toggle { background: #475569; color: white; border: 1px solid #64748b; }
        
        .label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-bottom: 25px;">Parking Control</h2>
    
    <button class="btn-connect" id="connBtn" onclick="connectBT()">CONNECT TO GATE</button>
    
    <div id="controls" style="display:none;">
        <div class="label">Current Gate Status</div>
        <div id="gateStatus" class="status-box">DISCONNECTED</div>
        
        <button class="btn-open" onclick="send('O')">OPEN GATE NOW</button>
        <button class="btn-toggle" id="sensBtn" onclick="send('A')">AUTO-SENSOR: OFF</button>
    </div>
</div>

<script>
    let char;
    const decoder = new TextDecoder();
    const SERVICE_UUID = 0xFFE0; // Standard HM-10 Service
    const CHAR_UUID = 0xFFE1;    // Standard HM-10 Characteristic

    async function connectBT() {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: [SERVICE_UUID] }],
                optionalServices: [SERVICE_UUID]
            });
            
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            char = await service.getCharacteristic(CHAR_UUID);
            
            await char.startNotifications();
            char.addEventListener('characteristicvaluechanged', (e) => {
                let msg = decoder.decode(e.target.value).trim();
                updateUI(msg);
            });

            document.getElementById('connBtn').style.display = 'none';
            document.getElementById('controls').style.display = 'block';
            updateUI("G:CLOSED");
        } catch (e) {
            alert("Bluetooth connection failed. Is the module powered on?");
        }
    }

    function updateUI(msg) {
        const status = document.getElementById('gateStatus');
        const sBtn = document.getElementById('sensBtn');

        if (msg.includes("G:MOVING")) {
            status.innerText = "GATE MOVING...";
            status.className = "status-box status-moving";
        } else if (msg.includes("G:OPEN")) {
            status.innerText = "GATE OPEN";
            status.className = "status-box status-open";
        } else if (msg.includes("G:CLOSED")) {
            status.innerText = "GATE CLOSED";
            status.className = "status-box status-closed";
        }

        if (msg.includes("GS:ON")) {
            sBtn.innerText = "AUTO-SENSOR: ACTIVE";
            sBtn.style.background = "#059669";
        } else if (msg.includes("GS:OFF")) {
            sBtn.innerText = "AUTO-SENSOR: OFF";
            sBtn.style.background = "#475569";
        }
    }

    async function send(data) {
        if (!char) return;
        try {
            await char.writeValue(new TextEncoder().encode(data));
        } catch (e) { console.log("Send Error:", e); }
    }
</script>
</body>
</html>
